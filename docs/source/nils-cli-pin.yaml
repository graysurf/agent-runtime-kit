# nils-cli surface pin — machine-readable gate input.
#
# Consumed by `scripts/ci/all.sh` Position 2 through
#   agent-runtime doctor --class version-alignment --pin docs/source/nils-cli-pin.yaml
# (released in nils-cli v0.28.0, sympoies/nils-cli#636).
#
# Contract: the doctor class blocks on ANY deviation of the host
# `agent-runtime` from `pinned_tag` — ahead OR behind — because a silent
# `brew upgrade sympoies/tap/nils-cli` past the pin is exactly the drift
# this guards (the v0.17.6 -> v0.17.7 incident in the
# `plan-issue-v2-marker-collapse-drift` inbox case). This is stricter than
# the prior shell gate, which tolerated a newer host; bumping the host now
# requires a conscious pin bump (see the `meta:nils-cli-bump` skill).
#
# The human-readable surface snapshot — crate -> binary table, consumed
# surfaces, refresh procedure — stays in docs/source/nils-cli-surface.md.
# Keep `pinned_tag` here and the `Active git describe --tags output:` line
# there in lock-step.
schema_version: 1

nils_cli:
  # Tag `agent-runtime --version` must report, exactly (major.minor.patch).
  pinned_tag: "v1.18.6"
  # Release artifact SHA256 pins consumed by docker/build.sh and the GHCR
  # publish workflow. Keep these in lock-step with pinned_tag so the Docker
  # image build verifies nils-cli against an in-repo digest, not only the
  # release sidecar downloaded from the same server.
  release_sha256:
    linux_amd64: "b1e2db1c8c825e4613384c11120b2a35d549ae0df893d623bfa7fe457d069493"
    linux_arm64: "e3b0aab663da1904fba0de5bde5f37aa618bf9db5c06cc0917bc3e01fcbeb0b0"

# Optional per-binary floors for the downstream-consumed CLIs. nils-cli
# ships every crate in lock-step, so the exact `pinned_tag` above is the
# primary gate; these floors are a belt-and-suspenders guard against a
# partial release (e.g. the v0.25.7 partial bump) and document the minimum
# consumed surface each binary must satisfy. Values track the
# surface-introduction versions recorded in docs/source/nils-cli-surface.md.
required_clis:
  - bin: plan-issue       # tracking controller + execution-state sync/writeback + review evidence context gate + provider payload privacy gate + lifecycle mutation lock + unified terminal closeout rows
    min: "1.1.0"
  - bin: plan-tooling     # ledger-update / ledger-sync + exec-state-sync repair
    min: "1.0.1"
  - bin: forge-cli        # pr/issue lifecycle + label list/audit/ensure surfaces + provider payload privacy gate + GitLab MR check/merge API path + review-thread read surface and merge gate + task-list read surface and merge gate + existing-PR adoption in pr deliver + config-gated test-first evidence gate (--test-first-evidence + [test_first].require, layered global config) + pr review-threads list/resolve/reply subcommand group (resolve/reply are GitHub-only write surfaces) + fork-safe remote-derived --repo targeting for provider ops + pr review outcome posting with optional issue mirror + GitHub pr review --thread-file for actionable resolvable review findings
    min: "1.17.0"
  - bin: plan-archive     # discover / migrate / refresh / query
    min: "0.25.5"
  - bin: agent-docs       # data-driven catalog + declared-intent preflight guard + product-scoped document/validation filtering (`--product`) with `agent-docs.preflight.v2`
    min: "1.12.1"
  - bin: agent-memory     # shared git-backed memory index consumed opportunistically by the Codex UserPromptSubmit memory cue hook (`agent-memory index global`)
    min: "0.28.1"
  - bin: evidence         # durable skill-usage evidence archive surface: migrate (--host + blocked-record handling), unclassified-host block (a resolved host absent from hosts.yaml is blocked, not written — the kit's gamania-safety guarantee), working_repo_roots identity rescue, cwd/origin + slug identity hardening, the purge retention command (--host/--class delete-on-termination) with apply safety, skill-path home-relativization so rollup ids / dir names / the skill field never leak the machine home, and prune-source --archived-only source cleanup after archive catalog digest match
    min: "1.12.0"
  - bin: git-cli          # managed worktree add/list/remove/prune surface
    min: "0.31.5"
  - bin: heuristic-inbox  # deliver + --label: records-branch PR writeback + default slug auto-suffixing (closeout consumer) + operation-record archive / status lifecycle support
    min: "1.8.0"
  - bin: zsh-kit          # runtime shell setup entrypoint + managed zshenv bootstrap for operator-supplied Zsh repos
    min: "1.0.9"
  - bin: agent-runtime    # home-prompt render target for per-product AGENT_HOME output (`render --target home-prompt`)
    min: "1.12.1"
