name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-stack:
    name: scripts/ci/all.sh
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Homebrew 6.0.0 made the rootless-bwrap(1) build sandbox mandatory on
      # Linux, and the ubuntu-24.04 runner's AppArmor unprivileged-userns
      # restriction blocks rootless bwrap even when bubblewrap is installed.
      # The sandbox guards nothing for a binary-pour tap install in throwaway
      # CI, so use Homebrew's documented opt-out.
      HOMEBREW_NO_SANDBOX_LINUX: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap sympoies/tap
        run: brew tap sympoies/tap

      - name: Install nils-cli (ships agent-runtime + plan-tooling)
        run: brew install sympoies/tap/nils-cli

      - name: Print toolchain versions
        run: |
          set -euo pipefail
          echo "bash: $(bash --version | head -1)"
          echo "git: $(git --version)"
          echo "agent-runtime: $(agent-runtime --version || true)"
          echo "plan-tooling: $(plan-tooling --version || true)"

      - name: Run scripts/ci/all.sh
        run: bash scripts/ci/all.sh
