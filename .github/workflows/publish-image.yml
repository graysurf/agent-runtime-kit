name: publish-image

# Publish the standalone Linux image to GHCR on a GitHub Release.
#
# Versioning is CalVer: a release tag `vYYYY.MM.DD` (see RELEASING.md). Creating
# the release (`gh release create vYYYY.MM.DD --generate-notes`) creates the tag
# and fires this workflow. The image is published to
# ghcr.io/<owner>/<repo> for linux/amd64 + linux/arm64, with a smoke test gate
# before the multi-arch push.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build, smoke-test, push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve nils-cli pin
        id: pin
        # Single-source the nils-cli version from the repo pin gate, mirroring
        # docker/build.sh. The CalVer release tag versions the kit snapshot; the
        # bundled nils-cli is independent and always follows the pin file.
        run: |
          set -euo pipefail
          PIN="$(sed -n -E 's/^[[:space:]]*pinned_tag:[[:space:]]*"?([^"#]+)"?.*/\1/p' \
            docs/source/nils-cli-pin.yaml | head -1 | tr -d '[:space:]')"
          test -n "$PIN" || { echo "could not read nils_cli.pinned_tag" >&2; exit 1; }
          echo "nils_cli=$PIN" >> "$GITHUB_OUTPUT"
          echo "nils-cli pin: $PIN"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=v(\d{4}\.\d{2}\.\d{2}),group=1
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build amd64 for smoke test
        # Single-platform build loaded into the runner's docker so the image can
        # actually run. buildx layer cache is reused by the multi-arch push.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            NILS_CLI_VERSION=${{ steps.pin.outputs.nils_cli }}
          load: true
          tags: agent-runtime-kit:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          run() { docker run --rm -e AGENT_RUNTIME_KIT_QUIET=1 agent-runtime-kit:smoke "$@"; }
          run claude --version
          run codex --version
          run agent-runtime --version
          run bash -lc 'test -L "$HOME/.claude/CLAUDE.md" && test -L "$CODEX_HOME/AGENTS.md"'

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            NILS_CLI_VERSION=${{ steps.pin.outputs.nils_cli }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
