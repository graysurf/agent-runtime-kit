name: publish-image

# Publish the standalone Linux image to GHCR on a GitHub Release.
#
# Versioning is CalVer: a release tag `vYYYY.MM.DD` (see RELEASING.md). Creating
# the release (`gh release create vYYYY.MM.DD --generate-notes`) creates the tag
# and fires this workflow. The image is published to
# ghcr.io/<owner>/<repo> for linux/amd64 + linux/arm64, with a smoke test gate
# before the multi-arch push.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build, smoke-test, push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Resolve nils-cli pin
        id: pin
        # Single-source the nils-cli version from the repo pin gate, mirroring
        # docker/build.sh. The CalVer release tag versions the kit snapshot; the
        # bundled nils-cli is independent and always follows the pin file.
        run: |
          set -euo pipefail
          PIN="$(sed -n -E 's/^[[:space:]]*pinned_tag:[[:space:]]*"?([^"#]+)"?.*/\1/p' \
            docs/source/nils-cli-pin.yaml | head -1 | tr -d '[:space:]')"
          SHA_AMD64="$(sed -n -E 's/^[[:space:]]*linux_amd64:[[:space:]]*"?([0-9a-f]{64})"?.*/\1/p' \
            docs/source/nils-cli-pin.yaml | head -1 | tr -d '[:space:]')"
          SHA_ARM64="$(sed -n -E 's/^[[:space:]]*linux_arm64:[[:space:]]*"?([0-9a-f]{64})"?.*/\1/p' \
            docs/source/nils-cli-pin.yaml | head -1 | tr -d '[:space:]')"
          test -n "$PIN" || { echo "could not read nils_cli.pinned_tag" >&2; exit 1; }
          test -n "$SHA_AMD64" || { echo "could not read nils_cli.release_sha256.linux_amd64" >&2; exit 1; }
          test -n "$SHA_ARM64" || { echo "could not read nils_cli.release_sha256.linux_arm64" >&2; exit 1; }
          echo "nils_cli=$PIN" >> "$GITHUB_OUTPUT"
          echo "nils_cli_sha256_amd64=$SHA_AMD64" >> "$GITHUB_OUTPUT"
          echo "nils_cli_sha256_arm64=$SHA_ARM64" >> "$GITHUB_OUTPUT"
          echo "nils-cli pin: $PIN"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=v(\d{4}\.\d{2}\.\d{2}),group=1
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build amd64 for smoke test
        # Single-platform build loaded into the runner's docker so the image can
        # actually run. buildx layer cache is reused by the multi-arch push.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            NILS_CLI_VERSION=${{ steps.pin.outputs.nils_cli }}
            NILS_CLI_SHA256_AMD64=${{ steps.pin.outputs.nils_cli_sha256_amd64 }}
            NILS_CLI_SHA256_ARM64=${{ steps.pin.outputs.nils_cli_sha256_arm64 }}
          load: true
          tags: agent-runtime-kit:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          run() { docker run --rm -e AGENT_RUNTIME_KIT_QUIET=1 agent-runtime-kit:smoke "$@"; }
          run claude --version
          run codex --version
          run agent-runtime --version
          run zsh --version
          run zsh-kit --version
          run bash -lc 'test "$(getent passwd agent | cut -d: -f7)" = /usr/bin/zsh'
          run zsh -ic 'test "$PWD" = "$HOME"'
          run zsh -ic 'print -r -- shell-ok'
          run zsh -ic 'command -v starship && command -v zoxide && command -v eza && command -v delta && command -v tree && command -v nvim && command -v notify-send'
          run zsh-kit setup --repo https://example.invalid/operator/zsh.git --dest /tmp/zsh-kit-dry-run --dry-run --features docker --install-tools skip
          run bash -lc '$AGENT_KIT_SRC/docker/smoke-zsh-kit-apply.sh'
          fixture="$(mktemp -d)"
          mkdir -p "$fixture/bootstrap"
          cp docker/fixtures/zsh-kit-setup/bootstrap/zsh-kit-setup.zsh "$fixture/bootstrap/zsh-kit-setup.zsh"
          git -C "$fixture" init -b main
          git -C "$fixture" add bootstrap/zsh-kit-setup.zsh
          git -C "$fixture" \
            -c commit.gpgsign=false \
            -c user.name='agent-runtime-kit smoke' \
            -c user.email='agent-runtime-kit-smoke@example.invalid' \
            commit -m 'add zsh-kit fixture setup hook'
          printf '[safe]\n\tdirectory = /fixture/.git\n' > "$fixture/.gitconfig"
          chmod -R a+rX "$fixture"
          docker run --rm -e AGENT_RUNTIME_KIT_QUIET=1 \
            -e GIT_CONFIG_GLOBAL=/fixture/.gitconfig \
            -e ZSH_SETUP_REPO_URL=/fixture \
            -e ZSH_SETUP_FEATURES=docker,opencode \
            -e ZSH_SETUP_INSTALL_TOOLS=skip \
            -v "$fixture:/fixture:ro" \
            agent-runtime-kit:smoke \
            zsh -ic 'test "$ZSH_FEATURES" = docker,opencode && test "$ZDOTDIR" = "$HOME/.config/zsh" && test -f "$HOME/.config/zsh/.zsh-kit-smoke/hook-ran.txt"'
          run gh --version
          run glab --version
          run rg --version
          run fd --version
          run fzf --version
          run jq --version
          run yq --version
          run bat --version
          run bash -lc 'test -L "$HOME/.claude/CLAUDE.md" && test -L "$CODEX_HOME/AGENTS.md"'

      - name: Build and push multi-arch
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            NILS_CLI_VERSION=${{ steps.pin.outputs.nils_cli }}
            NILS_CLI_SHA256_AMD64=${{ steps.pin.outputs.nils_cli_sha256_amd64 }}
            NILS_CLI_SHA256_ARM64=${{ steps.pin.outputs.nils_cli_sha256_arm64 }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Verify public GHCR manifests
        run: |
          set -euo pipefail

          token_for() {
            local image_path="$1"
            curl -fsSL \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${image_path}:pull" |
              python3 -c 'import json, sys; data = json.load(sys.stdin); print(data.get("token") or data.get("access_token") or "")'
          }

          platforms_for() {
            python3 -c 'import json, sys
          data = json.load(sys.stdin)
          platforms = []
          for item in data.get("manifests") or []:
              platform = item.get("platform") or {}
              os = platform.get("os")
              arch = platform.get("architecture")
              if os and arch:
                  platforms.append(f"{os}/{arch}")
          print(" ".join(platforms))'
          }

          verify_ref() {
            local image_ref="$1"
            local image_path tag token manifest platforms

            image_ref="${image_ref#ghcr.io/}"
            image_path="${image_ref%:*}"
            tag="${image_ref##*:}"

            token="$(token_for "$image_path")"
            test -n "$token"
            manifest="$(curl -fsSL \
              -H "Authorization: Bearer $token" \
              -H 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json' \
              "https://ghcr.io/v2/${image_path}/manifests/${tag}")"
            platforms="$(printf '%s' "$manifest" | platforms_for)"

            case " $platforms " in
              *" linux/amd64 "*) ;;
              *)
                echo "missing linux/amd64 for ghcr.io/${image_path}:${tag} (platforms: ${platforms:-none})" >&2
                exit 1
                ;;
            esac
            case " $platforms " in
              *" linux/arm64 "*) ;;
              *)
                echo "missing linux/arm64 for ghcr.io/${image_path}:${tag} (platforms: ${platforms:-none})" >&2
                exit 1
                ;;
            esac

            echo "verified public GHCR manifest: ghcr.io/${image_path}:${tag} (${platforms})"
          }

          printf '%s\n' "${{ steps.meta.outputs.tags }}" |
            while IFS= read -r image_ref; do
              test -n "$image_ref" || continue
              verify_ref "$image_ref"
            done
