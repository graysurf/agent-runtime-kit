# Runtime skill acceptance matrix.
#
# This file intentionally uses a small YAML subset so
# tests/runtime-smoke/run.sh can validate it with portable shell tools before
# later sprints add richer case runners.
schema_version: 1

required_fields:
  - id
  - product
  - domain
  - skill_id
  - mode
  - fixture_workspace
  - setup
  - invocation
  - expected_exit_code
  - expected_artifacts
  - cleanup
  - expected_disposition
  - skip_policy

dispositions:
  - pass
  - fail
  - skip-host-capability
  - blocked-design

