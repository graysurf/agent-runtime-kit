# Runtime skill acceptance matrix.
#
# This file intentionally uses a small YAML subset so
# tests/runtime-smoke/run.sh can validate it with portable shell tools before
# later sprints add richer case runners.
schema_version: 1

required_fields:
  - id
  - product
  - domain
  - skill_id
  - mode
  - fixture_workspace
  - setup
  - invocation
  - expected_exit_code
  - expected_artifacts
  - cleanup
  - expected_disposition
  - skip_policy

dispositions:
  - pass
  - fail
  - skip-host-capability
  - blocked-design

cases:
  - id: meta.agent-docs.shared-cli.deterministic
    product: shared-cli
    domain: meta
    skill_id: meta.agent-docs
    mode: deterministic
    fixture_workspace: tests/runtime-smoke/workspaces/basic-repo
    setup: none
    invocation: agent-docs resolve startup context in strict checklist mode
    expected_exit_code: 0
    expected_artifacts: checklist output
    cleanup: temp-output-only
    expected_disposition: pass
    skip_policy: none
