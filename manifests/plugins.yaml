# Plugin manifest — groups each domain's skills into a per-product plugin.
# Covers every migrated domain; add a plugin entry here when a new domain ships.
#
# Schema: ../core/docs/schemas/plugins.schema.json
#
# Each entry MUST declare `id`, `domain`, `contained_skills`, and
# `product_manifests`. Plugin `domain` cross-references skill `domain`
# fields in `skills.yaml`.
schema_version: 1

plugins:
  - id: reporting
    domain: reporting
    contained_skills:
      - reporting.daily-brief
      - reporting.project-retro
      - reporting.topic-radar
    product_manifests:
      codex: targets/codex/plugins/reporting/.codex-plugin/plugin.json
      claude: targets/claude/plugins/reporting/.claude-plugin/plugin.json
    install_policy: always

  - id: meta
    domain: meta
    contained_skills:
      - meta.agent-docs
      - meta.agent-out
      - meta.bootstrap
      - meta.deploy
      - meta.agent-scope-lock
      - meta.heuristic-inbox
      - meta.heuristic-session-closeout
      - meta.create-skill
      - meta.create-project-skill
      - meta.remove-skill
      - meta.remove-project-skill
      - meta.sync-runtime-surfaces
      - meta.pre-pr
      - meta.release
      - meta.repo-retro
      - meta.semantic-commit
      - meta.setup-project
      - meta.plan-archive-migrate
      - meta.plan-archive-query
      - meta.plan-archive-discover
      - meta.nils-cli-bump
      - meta.worktree-triage
    product_manifests:
      codex: targets/codex/plugins/meta/.codex-plugin/plugin.json
      claude: targets/claude/plugins/meta/.claude-plugin/plugin.json
    install_policy: always

  - id: media
    domain: media
    contained_skills:
      - media.image-processing
