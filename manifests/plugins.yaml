# Plugin manifest — Plan 03 lands the reporting plugin entry here. Other
# domain plugins follow in Plan 05.
#
# Schema: ../core/docs/schemas/plugins.schema.json
# Architecture: docs/source/inventory-target-architecture.md `## Manifest Layer`
#
# Each entry MUST declare `id`, `domain`, `contained_skills`, and
# `product_manifests`. Plugin `domain` cross-references skill `domain`
# fields in `skills.yaml`.
schema_version: 1

plugins:
  - id: reporting
    domain: reporting
    contained_skills:
      - reporting.daily-brief
      - reporting.project-retro
      - reporting.topic-radar
    product_manifests:
      codex: targets/codex/plugins/reporting/.codex-plugin/plugin.json
      claude: targets/claude/plugins/reporting/.claude-plugin/plugin.json
    install_policy: always

  - id: meta
    domain: meta
    contained_skills:
      - meta.agent-docs
      - meta.agent-out
      - meta.bench
      - meta.bootstrap
      - meta.demo
      - meta.deploy
      - meta.agent-scope-lock
      - meta.heuristic-inbox
      - meta.create-skill
      - meta.create-project-skill
      - meta.remove-skill
      - meta.remove-project-skill
      - meta.pre-pr
      - meta.release
      - meta.repo-retro
      - meta.semantic-commit
    product_manifests:
      codex: targets/codex/plugins/meta/.codex-plugin/plugin.json
      claude: targets/claude/plugins/meta/.claude-plugin/plugin.json
    install_policy: always

  - id: media
    domain: media
    contained_skills:
      - media.image-processing
      - media.screen-record
    product_manifests:
      codex: targets/codex/plugins/media/.codex-plugin/plugin.json
      claude: targets/claude/plugins/media/.claude-plugin/plugin.json
    install_policy: always

  - id: browser
    domain: browser
    contained_skills:
      - browser.browser-session
      - browser.canary-check
    product_manifests:
      codex: targets/codex/plugins/browser/.codex-plugin/plugin.json
      claude: targets/claude/plugins/browser/.claude-plugin/plugin.json
    install_policy: always

  - id: conversation
    domain: conversation
    contained_skills:
      - conversation.actionable-advice
      - conversation.actionable-knowledge
      - conversation.discussion-to-implementation-doc
      - conversation.handoff-session-prompt
      - conversation.orchestrator-first
      - conversation.parallel-first
      - conversation.test-first
    product_manifests:
      codex: targets/codex/plugins/conversation/.codex-plugin/plugin.json
      claude: targets/claude/plugins/conversation/.claude-plugin/plugin.json
    install_policy: always

  - id: evidence
    domain: evidence
    contained_skills:
      - evidence.web-evidence
      - evidence.test-first-evidence
      - evidence.review-evidence
      - evidence.skill-usage
      - evidence.docs-impact
      - evidence.model-cross-check
    product_manifests:
      codex: targets/codex/plugins/evidence/.codex-plugin/plugin.json
      claude: targets/claude/plugins/evidence/.claude-plugin/plugin.json
    install_policy: always

  - id: issue
    domain: issue
    contained_skills:
      - issue.issue-follow-up
    product_manifests:
      codex: targets/codex/plugins/issue/.codex-plugin/plugin.json
      claude: targets/claude/plugins/issue/.claude-plugin/plugin.json
    install_policy: always

  - id: code-review
    domain: code-review
    contained_skills:
      - code-review.code-review-specialists
    product_manifests:
      codex: targets/codex/plugins/code-review/.codex-plugin/plugin.json
      claude: targets/claude/plugins/code-review/.claude-plugin/plugin.json
    install_policy: always

  - id: pr
    domain: pr
    contained_skills:
      - pr.create-github-pr
      - pr.create-gitlab-mr
      - pr.create-dispatch-lane-pr
      - pr.close-github-pr
      - pr.close-gitlab-mr
      - pr.deliver-github-pr
      - pr.deliver-gitlab-mr
    product_manifests:
      codex: targets/codex/plugins/pr/.codex-plugin/plugin.json
      claude: targets/claude/plugins/pr/.claude-plugin/plugin.json
    install_policy: always

  - id: dispatch
    domain: dispatch
    contained_skills:
      - dispatch.create-plan-tracking-issue
      - dispatch.deliver-dispatch-plan
      - dispatch.dispatch-plan-closeout
      - dispatch.plan-tracking-issue-closeout
      - dispatch.execute-plan-tracking-issue
      - dispatch.deliver-plan-tracking-issue
      - dispatch.review-dispatch-lane-pr
      - dispatch.execute-dispatch-lane
    product_manifests:
      codex: targets/codex/plugins/dispatch/.codex-plugin/plugin.json
      claude: targets/claude/plugins/dispatch/.claude-plugin/plugin.json
    install_policy: always
