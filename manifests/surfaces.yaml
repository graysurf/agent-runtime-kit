        min_product: "2.1.145"
        min_nils_cli: "v0.20.0"
        acceptance:
          - kind: ci
            note: "gate 3 (render), gate 4 (golden), gate 5 (drift), gate 7 (sandbox), gate 8 (runtime-smoke)"
            descriptive_only: true
          - kind: live
            note: "—"
            descriptive_only: true
