# SUPPORT_MATRIX surface registry.
#
# Schema: ../core/docs/schemas/surfaces.schema.json
# Architecture: docs/source/harness-shape-codex.md, docs/source/harness-shape-claude.md
# Plan: docs/plans/support-matrix-rendered/
#
# This manifest is the canonical row registry for the cross-product
# SUPPORT_MATRIX view rendered by `agent-runtime render --target
# support-matrix`.
#
# `source_manifest` provenance uses `path` or `path#anchor` (never line
# numbers); `scripts/ci/validate-surfaces-manifest.sh` resolves each entry
# so it cannot rot into a dead link.
schema_version: 1

render:
  target: support-matrix
  root_view: SUPPORT_MATRIX.md
  output: build/shared/SUPPORT_MATRIX.md

surfaces:
  - id: home-prompt
    ordinal: 1
    name: "home prompt (`AGENTS.md` / `CLAUDE.md`)"
    products:
      codex:
        state: shipped
        mechanism: "`agent-runtime render --target home-prompt --product codex` writes `build/codex/AGENT_HOME.md`; `$CODEX_HOME/AGENTS.md` symlinks to that rendered file"
        source_artifacts:
          - AGENT_HOME.md
          - build/codex/AGENT_HOME.md
        min_product: "0.130.0"
        min_nils_cli: "v1.12.1"
        acceptance:
          - kind: ci
            note: "— (home-policy cutover only)"
            descriptive_only: true
          - kind: live
            command: 'test -e "${CODEX_HOME:-$HOME/.codex}/AGENTS.md"'
            success:
              exit_status: 0
        source_manifest:
          - "docs/source/harness-shape-codex.md#1-home-scope-prompt-agentsmd"
          - AGENT_HOME.md
      claude:
        state: shipped
        mechanism: "`agent-runtime render --target home-prompt --product claude` writes `build/claude/AGENT_HOME.md`; `$HOME/.claude/CLAUDE.md` symlinks to that rendered file"
        source_artifacts:
          - AGENT_HOME.md
          - build/claude/AGENT_HOME.md
        min_product: "2.1.145"
        min_nils_cli: "v1.12.1"
        acceptance:
          - kind: ci
            note: "— (home-policy cutover only)"
            descriptive_only: true
          - kind: live
            note: "live Claude session"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-claude.md#1-home-scope-prompt-claudemd"
          - AGENT_HOME.md

  - id: project-prompt
    ordinal: 2
    name: "project prompt (`./AGENTS.md` / `./CLAUDE.md`)"
    products:
      codex:
        state: shipped
        mechanism: "repo working tree; `./AGENTS.md` tracked"
        source_artifacts:
          - AGENTS.md
        min_product: "0.130.0"
        min_nils_cli: "n/a"
        acceptance:
          - kind: ci
            command: "test -f AGENTS.md"
            success:
              exit_status: 0
          - kind: live
            note: "live Codex session in repo"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-codex.md#2-project-scope-prompt-agentsmd"
          - AGENTS.md
      claude:
        state: shipped
        mechanism: "repo working tree; `./CLAUDE.md` symlinks to `./AGENTS.md`"
        source_artifacts:
          - "CLAUDE.md -> AGENTS.md"
        min_product: "2.1.145"
        min_nils_cli: "n/a"
        acceptance:
          - kind: ci
            note: "—"
            descriptive_only: true
          - kind: live
            note: "live Claude session in repo"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-claude.md#2-project-scope-prompt-claudemd"
          - AGENTS.md

  - id: plugin-manifest
    ordinal: 3
    name: "plugin manifest (`.codex-plugin` / `.claude-plugin` `plugin.json`)"
    products:
      codex:
        state: shipped
        mechanism: "`plugin-manifest-copy` per plugin into `$CODEX_HOME/plugins/<p>/.codex-plugin/plugin.json`; Codex's plugin loader reads it through the installed `codex-kit` marketplace. Codex discovers the plugin's bundled `skills/<skill>/SKILL.md` directly and ignores the manifest `skills` array (kept as audit metadata)."
        source_artifacts:
          - "targets/codex/plugins/<plugin>/.codex-plugin/plugin.json"
        min_product: "0.141.0"
        min_nils_cli: "v0.17.5"
        acceptance:
          - kind: ci
            note: "gate 1 (governance plugin-skills audit), gate 5 (audit-drift plugin-manifest-skills), gate 7 (sandbox install rehearsal)"
            descriptive_only: true
          - kind: live
            note: "`codex plugin add <plugin>@codex-kit` caches `.codex-plugin/plugin.json`; `codex plugin list` shows the installed plugin"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-codex.md#3-plugin-manifest-codex-pluginpluginjson"
          - manifests/product-capabilities.yaml
          - targets/codex/link-map.yaml
      claude:
        state: shipped
        mechanism: "`plugin-manifest-copy` per plugin into `~/.claude/plugins/<p>/.claude-plugin/plugin.json`"
        source_artifacts:
          - "targets/claude/plugins/<plugin>/.claude-plugin/plugin.json"
        min_product: "2.1.145"
        min_nils_cli: "v0.17.5"
        acceptance:
          - kind: ci
            note: "gate 5 (audit-drift), gate 7 (sandbox install rehearsal)"
            descriptive_only: true
          - kind: live
            note: "—"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-claude.md#3-plugin-manifest-claude-pluginpluginjson"
          - manifests/product-capabilities.yaml
          - targets/claude/link-map.yaml

  - id: plugin-marketplace
    ordinal: 4
    name: "plugin marketplace (`.claude-plugin/marketplace.json`)"
    products:
      codex:
        state: shipped
        mechanism: "`plugin-manifest-copy` of the canonical `.agents/plugins/marketplace.json`, then `sync-runtime-surfaces.sh --apply --product codex` materializes a symlink-free marketplace under the Codex state home, registers that path as `codex-kit` (`codex plugin marketplace add`), and installs every `<plugin>@codex-kit` (`codex plugin add`). First-time `setup.sh` delegates the same activation after bootstrap."
        source_artifacts:
          - targets/codex/.agents/plugins/marketplace.json
          - scripts/sync-runtime-surfaces.sh
        min_product: "0.141.0"
        min_nils_cli: "v0.17.5"
        acceptance:
          - kind: ci
            note: "gate 8 (runtime-smoke codex plugin-registry probes: default dry-run prints the activation plan without executing it; stubbed apply registers codex-kit and installs each <plugin>@codex-kit)"
            descriptive_only: true
          - kind: live
            note: "`sync-runtime-surfaces.sh --apply --product codex` then `codex plugin list` includes `<plugin>@codex-kit`; `codex debug prompt-input` lists skills as `<plugin>:<skill>`"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-codex.md#4-plugin-marketplace-agentspluginsmarketplacejson"
          - manifests/product-capabilities.yaml
          - targets/codex/link-map.yaml
      claude:
        state: shipped
        mechanism: "`plugin-manifest-copy` of root marketplace.json, then `sync-runtime-surfaces.sh --apply --product claude` materializes a symlink-free marketplace under Claude state home, registers that path as `claude-kit`, and reinstalls every `<plugin>@claude-kit` through the Claude plugin CLI; first-time `setup.sh` delegates the same activation after bootstrap"
        source_artifacts:
          - targets/claude/.claude-plugin/marketplace.json
          - scripts/sync-runtime-surfaces.sh
          - scripts/setup.sh
        min_product: "2.1.145"
        min_nils_cli: "v0.17.5"
        acceptance:
          - kind: ci
            note: "gate 5 (audit-drift), gate 7, gate 8 (runtime-smoke Claude materialized plugin registry and setup activation fixtures)"
            descriptive_only: true
          - kind: live
            note: "`claude plugins list` includes the runtime-kit `<plugin>@claude-kit` entries after sync, with cache populated from the state-home materialized marketplace"
            descriptive_only: true
        source_manifest:
          - "docs/source/harness-shape-claude.md#4-plugin-marketplace-claude-pluginmarketplacejson"
          - manifests/product-capabilities.yaml
          - targets/claude/link-map.yaml

