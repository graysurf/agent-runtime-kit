# Per-product runtime root manifest.
#
# Schema: ../core/docs/schemas/runtime-roots.schema.json
# Version-floor / Bump Ceremony: .github/PULL_REQUEST_TEMPLATE/min-version-bump.md
#
# Version-pin fields (`min_version`, `recommended_version`,
# `min_version_effective_from`) were Phase 1 placeholders, pinned to
# concrete values from a development-host snapshot on 2026-05-21
# during the Plan 01 cleanup PR (the Plan 03 plan reserves `0.130.0`
# and `2.1.145` as the Codex / Claude snapshot baselines).
# `min_version_effective_from` is set 14 days after the Phase 2 PR
# merge target so existing hosts have a runway before the floor
# starts blocking.
schema_version: 1

products:
  codex:
    live_home: "$CODEX_HOME"
    docs_home: "$CODEX_HOME"
    state_home: "${CODEX_AGENT_STATE_HOME:-${XDG_STATE_HOME:-$HOME/.local/state}/agent-runtime-kit/codex}"
    plugin_root: "$CODEX_HOME/plugins"
    hook_config_strategy: "managed-block"
    min_version: "0.130.0"
    recommended_version: "0.130.0"
    min_version_effective_from: "2026-06-03"
    version_probe: "codex --version"

  claude:
    live_home: "$HOME/.claude"
    docs_home: "$HOME/.claude"
    state_home: "${CLAUDE_KIT_STATE_HOME:-${XDG_STATE_HOME:-$HOME/.local/state}/agent-runtime-kit/claude}"
    plugin_root_env: "CLAUDE_PLUGIN_ROOT"
    hook_config_strategy: "settings-json"
    min_version: "2.1.145"
    recommended_version: "2.1.145"
    min_version_effective_from: "2026-06-03"
    version_probe: "claude --version"
