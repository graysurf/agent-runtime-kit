    - fd
    - fzf
    - jq
    - yq
    - gh
    - glab
    - bat
    - glow
    - delta
    - ast-grep
    - watchexec
    - tree
    - eza
    - httpie
    - gitui
    - ruff
    - hyperfine
    - xh
    - grpcurl
    - websocat
    - mitmproxy
    - hey
    - ripgrep-all
    - bat-extras
    - repomix
    - entr
    - ipython
    - node
    - pnpm
    - pipx
    - direnv
    - hammerspoon
    - im-select
    - imagemagick
    - vips
    - pngquant
    - jpegoptim
    - mozjpeg
    - webp
    - lnav
    - tailspin
    - tokei
    - btop
    - htop
    - ncdu

