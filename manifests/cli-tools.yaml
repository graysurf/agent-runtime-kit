# Third-party CLI catalog (brew-installable).
#
# Schema: ../core/docs/schemas/cli-tools.schema.json
# Policy doc (narrative companion): ../core/policies/cli-tools.md
#
# Consumed by:
#   - scripts/setup.sh — install the selected profile via brew.
#   - agent-runtime doctor — probe `<command> --version` for every formula
#     in the active profile and report ok / missing / outdated.
#
# Nils-cli binaries (agent-out, agent-docs, semantic-commit, plan-tooling,
# git-cli, etc.) are NOT listed here. They ship as part of the `nils-cli`
# Homebrew formula and are pinned in `docs/source/nils-cli-surface.md`.
#
# Profiles are list-of-formula-keys. Every key listed in any profile MUST
# have an entry under `formulas:` below.
schema_version: 1

profiles:
  core:
    - ripgrep
    - fd
    - fzf
    - jq
    - yq
    - gh
    - glab
    - bat

  recommended:
    - ripgrep
    - fd
    - fzf
    - jq
    - yq
    - gh
    - glab
    - bat
    - glow
    - delta
    - ast-grep
    - watchexec
    - tree
    - eza
    - httpie
    - gitui
    - ruff
    - hyperfine

  full:
