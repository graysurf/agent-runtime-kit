# Per-product capability matrix.
#
# Schema: ../core/docs/schemas/product-capabilities.schema.json
#
# This is settled architecture: the capability matrix changes only when a
# product itself changes (e.g. Codex publishes a real plugin loader). Skill and
# plugin entries live in their own manifests.
#
# Codex adoption (2026-06, issue #435): Codex shipped a real plugin loader +
# marketplace (`codex plugin marketplace add`;
# developers.openai.com/codex/plugins/build), and runtime-kit now ships a Codex
# marketplace (`targets/codex/.agents/plugins/marketplace.json`, registered via
# `scripts/sync-runtime-surfaces.sh`). This SUPERSEDES Resolved Decision #10
# ("Codex `.codex-plugin/plugin.json` is audit-only; Codex does not load it"):
# the manifest is now a real plugin manifest that Codex's loader reads at
# runtime. A spike (issue #435) confirmed Codex discovers each plugin's bundled
# `skills/<skill>/SKILL.md` directly and IGNORES the manifest `skills` field, so
# that field is retained as source-organisation audit metadata rather than
# rewritten to a loader pointer. Issue #437 cut over Codex skill discovery to
# this plugin marketplace and retired the flat `$CODEX_HOME/skills` root.
schema_version: 1

products:
  codex:
    # Local skills are discovered from installed `codex-kit` plugin bundles as
    # `<plugin>:<skill>`. The retired flat
    # `$CODEX_HOME/skills/<domain>/<skill>/SKILL.md` root is no longer installed
    # by runtime-kit.
    nested_skill_support: true
    plugin_manifest:
      # Codex loads `.codex-plugin/plugin.json` at runtime through its plugin
      # marketplace (`codex plugin add <plugin>@codex-kit`). Codex discovers the
      # plugin's bundled `skills/<skill>/SKILL.md` directly and ignores the
      # manifest `skills` field, which runtime-kit keeps as audit metadata.
      path_pattern: "$CODEX_HOME/plugins/<domain>/.codex-plugin/plugin.json"
      loaded_at_runtime: true
      schema_ref: "core/docs/schemas/codex-plugin.schema.json"
    hooks_model:
      config_surface: "$CODEX_HOME/config.toml (agent-runtime-kit managed block)"
      payload_shape: "codex-toml-managed-block"
      supports_inline_python: false
    config_activation:
      - "$CODEX_HOME/AGENTS.md"
      - "$CODEX_HOME/plugins/<domain>/.codex-plugin/plugin.json"
      - "$CODEX_HOME/plugins/<domain>/skills/<skill>/SKILL.md"
      - "$CODEX_HOME/config.toml (managed block only)"
      - "$CODEX_HOME/hooks/<name>/ (scripts referenced from managed block)"
    runtime_state:
      state_home_env: "CODEX_AGENT_STATE_HOME"
      default_path: "${XDG_STATE_HOME:-$HOME/.local/state}/agent-runtime-kit/codex"
    # runtime-kit ships and activates a Codex marketplace (`codex-kit`)
    # registered via `codex plugin marketplace add`.
    marketplace_concept: true

  claude:
    nested_skill_support: true
    plugin_manifest:
      # Claude DOES load `.claude-plugin/plugin.json` at runtime through its
      # plugin loader. Drift audit may compare against Claude's published
      # plugin manifest contract when it stabilises; until then the local
      # schema is the contract.
      path_pattern: "${CLAUDE_PLUGIN_ROOT}/<plugin>/.claude-plugin/plugin.json"
      loaded_at_runtime: true
      schema_ref: "core/docs/schemas/claude-plugin.schema.json"
    hooks_model:
      config_surface: "$HOME/.claude/settings.json (hook block) + .claude/hooks/<name>.py"
      payload_shape: "claude-pretool-v1"
      supports_inline_python: true
    config_activation:
      - "$HOME/.claude/settings.json"
      - "${CLAUDE_PLUGIN_ROOT}/<plugin>/.claude-plugin/plugin.json"
      - "${CLAUDE_PLUGIN_ROOT}/<plugin>/skills/<skill>/"
      - "$HOME/.claude/marketplace.json"
    runtime_state:
      state_home_env: "CLAUDE_KIT_STATE_HOME"
      default_path: "${XDG_STATE_HOME:-$HOME/.local/state}/agent-runtime-kit/claude"
    marketplace_concept: true

  hermes:
    nested_skill_support: true
    plugin_manifest:
      # Hermes discovers skills from `~/.hermes/skills/<domain>/<skill>/SKILL.md`.
      # The plugin.json is metadata-only; discovery is filesystem-based.
      path_pattern: "$HOME/.hermes/plugins/<domain>/.hermes-plugin/plugin.json"
      loaded_at_runtime: false
      schema_ref: "core/docs/schemas/hermes-plugin.schema.json"
    hooks_model:
      config_surface: "n/a"
      payload_shape: "n/a"
      supports_inline_python: false
    config_activation:
      - "$HOME/.hermes/SOUL.md"
      - "$HOME/.hermes/skills/<domain>/<skill>/SKILL.md"
    runtime_state:
      state_home_env: "HERMES_HOME"
      default_path: "$HOME/.hermes"
    marketplace_concept: false

# Field-level diff between the two plugin manifests, validated against the
# concrete adapter plugin.json files under
# `targets/{codex,claude}/plugins/<domain>/`. Drift audit
# reads this to know which divergences are intentional and which are drift.
plugin_manifest_diff:
  shared_fields:
    - "name"
    - "version"
    - "description"
    - "author"
  codex_only_fields:
    # Codex's plugin loader discovers each plugin's bundled
    # `skills/<skill>/SKILL.md` directly and IGNORES the manifest `skills`
    # field, so runtime-kit keeps the array as a co-located audit inventory for
    # audit-drift's source-manifest / plugin-manifest-skills classes.
    - "skills"
  claude_only_fields:
    # `homepage` points at the published plugin repo for Claude's plugin
    # discovery UI. Codex has no equivalent surface.
    - "homepage"
