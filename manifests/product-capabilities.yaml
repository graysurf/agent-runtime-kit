# Per-product capability matrix.
#
# Schema: ../core/docs/schemas/product-capabilities.schema.json
#
# This is settled architecture: the capability matrix changes only when a
# product itself changes (e.g. Codex publishes a real plugin loader). Skill and
# plugin entries live in their own manifests. Resolved Decision #10 governs the
# Codex side.
#
# NOTE (2026-06): that trigger has now fired — Codex shipped a real plugin
# loader + marketplace (`codex plugin marketplace add`;
# developers.openai.com/codex/plugins/build). The Codex `loaded_at_runtime` and
# `marketplace_concept` values below still encode the pre-2026 baseline, because
# runtime-kit has NOT adopted Codex's plugin surface (it still installs Codex
# skills via the flat `$CODEX_HOME/skills` root). Flipping them reverses Resolved
# Decision #10 and pulls in the install/marketplace activation work, so they are
# intentionally left unchanged here; the capability-model correction + adoption
# is a separate tracked change.
schema_version: 1

products:
  codex:
    # Local skills are discovered from skill folders under
    # `$CODEX_HOME/skills/<domain>/<skill>/SKILL.md`. Runtime-kit uses
    # directory symlinks for this surface; individual `SKILL.md` symlinks are
    # not a valid Codex discovery contract.
    # `.codex-plugin` plugin trees are retained for source organization,
    # manifests, and audit-drift only; they are not the active Codex skill
    # discovery surface.
    nested_skill_support: true
    plugin_manifest:
      # runtime-kit does not install Codex skills as a plugin, so this
      # `.codex-plugin/plugin.json` is not loaded at runtime here — install
      # exposes runtime-kit skills through `$CODEX_HOME/skills` and keeps this
      # manifest for audit only. NOTE: Codex itself CAN load
      # `.codex-plugin/plugin.json` as of 2026; `loaded_at_runtime: false`
      # reflects runtime-kit's non-adoption, not a product limitation (see the
      # top-of-file NOTE).
      path_pattern: "$CODEX_HOME/plugins/<domain>/.codex-plugin/plugin.json"
      loaded_at_runtime: false
      schema_ref: "core/docs/schemas/codex-plugin.schema.json"
    hooks_model:
      config_surface: "$CODEX_HOME/config.toml (agent-runtime-kit managed block)"
      payload_shape: "codex-toml-managed-block"
      supports_inline_python: false
    config_activation:
      - "$CODEX_HOME/AGENTS.md"
      - "$CODEX_HOME/skills/<domain>/<skill>/SKILL.md"
      - "$CODEX_HOME/config.toml (managed block only)"
      - "$CODEX_HOME/hooks/<name>/ (scripts referenced from managed block)"
    runtime_state:
      state_home_env: "CODEX_AGENT_STATE_HOME"
      default_path: "${XDG_STATE_HOME:-$HOME/.local/state}/agent-runtime-kit/codex"
    # NOTE: stale baseline — Codex shipped an upstream plugin marketplace in
    # 2026. Left false pending the capability-model correction (see top NOTE).
    marketplace_concept: false

  claude:
    nested_skill_support: true
    plugin_manifest:
      # Claude DOES load `.claude-plugin/plugin.json` at runtime through its
      # plugin loader. Drift audit may compare against Claude's published
      # plugin manifest contract when it stabilises; until then the local
      # schema is the contract.
      path_pattern: "${CLAUDE_PLUGIN_ROOT}/<plugin>/.claude-plugin/plugin.json"
      loaded_at_runtime: true
      schema_ref: "core/docs/schemas/claude-plugin.schema.json"
    hooks_model:
      config_surface: "$HOME/.claude/settings.json (hook block) + .claude/hooks/<name>.py"
      payload_shape: "claude-pretool-v1"
      supports_inline_python: true
    config_activation:
      - "$HOME/.claude/settings.json"
      - "${CLAUDE_PLUGIN_ROOT}/<plugin>/.claude-plugin/plugin.json"
      - "${CLAUDE_PLUGIN_ROOT}/<plugin>/skills/<skill>/"
      - "$HOME/.claude/marketplace.json"
    runtime_state:
      state_home_env: "CLAUDE_KIT_STATE_HOME"
      default_path: "${XDG_STATE_HOME:-$HOME/.local/state}/agent-runtime-kit/claude"
    marketplace_concept: true

# Field-level diff between the two plugin manifests, validated against the
# concrete adapter plugin.json files under
# `targets/{codex,claude}/plugins/<domain>/`. Drift audit
# reads this to know which divergences are intentional and which are drift.
plugin_manifest_diff:
  shared_fields:
    - "name"
    - "version"
    - "description"
    - "author"
  codex_only_fields:
    # Codex `.codex-plugin/plugin.json` is source-organisation only; the
    # `skills` array is a co-located inventory for audit-drift's
    # source-manifest class and is NOT loaded by Codex at runtime.
    - "skills"
  claude_only_fields:
    # `homepage` points at the published plugin repo for Claude's plugin
    # discovery UI. Codex has no equivalent surface.
    - "homepage"
