# Codex install link map.
#
# Schema: ../../core/docs/schemas/link-map.schema.json
#
# Overlay merge for this file is per-entry replace, keyed by `id`. The
# install plan walks `entries` in order. `recursive: true` expands a
# directory into one symlink per file for plugin/audit trees. The active
# Codex skill root intentionally uses one non-recursive directory symlink per
# domain/skill folder because Codex discovers symlinked skill folders, not
# individual symlinked `SKILL.md` files.

schema_version: 1

