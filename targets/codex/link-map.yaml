# Codex install link map.
#
# Schema: ../../core/docs/schemas/link-map.schema.json
# Plan:   docs/plans/04-installer-doctor-and-bootstrap/04-installer-doctor-and-bootstrap-plan.md
#         Sprint 1 Task 1.2 — install pipeline body.
#
# Overlay merge for this file is per-entry replace, keyed by `id`. The
# install plan walks `entries` in order; `recursive: true` expands a
# directory into one symlink per file at plan time, so each rendered
# skill file lands as its own surface in the dry-run output.

schema_version: 1

entries:
  - id: reporting.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/reporting/.codex-plugin/plugin.json
    destination: plugins/reporting/.codex-plugin/plugin.json

  - id: reporting.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/reporting/skills
    destination: plugins/reporting/skills
    recursive: true

  - id: meta.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/meta/.codex-plugin/plugin.json
    destination: plugins/meta/.codex-plugin/plugin.json

  - id: meta.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/meta/skills
    destination: plugins/meta/skills
    recursive: true

  - id: media.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/media/.codex-plugin/plugin.json
    destination: plugins/media/.codex-plugin/plugin.json

  - id: media.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/media/skills
    destination: plugins/media/skills
    recursive: true

  - id: browser.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/browser/.codex-plugin/plugin.json
    destination: plugins/browser/.codex-plugin/plugin.json

  - id: browser.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/browser/skills
    destination: plugins/browser/skills
    recursive: true

  - id: evidence.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/evidence/.codex-plugin/plugin.json
    destination: plugins/evidence/.codex-plugin/plugin.json

  - id: evidence.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/evidence/skills
    destination: plugins/evidence/skills
    recursive: true
