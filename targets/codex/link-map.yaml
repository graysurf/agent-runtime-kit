# Codex install link map.
#
# Schema: ../../core/docs/schemas/link-map.schema.json
# Plan:   docs/plans/04-installer-doctor-and-bootstrap/04-installer-doctor-and-bootstrap-plan.md
#         Sprint 1 Task 1.2 — install pipeline body.
#
# Overlay merge for this file is per-entry replace, keyed by `id`. The
# install plan walks `entries` in order; `recursive: true` expands a
# directory into one symlink per file at plan time, so each rendered
# skill file lands as its own surface in the dry-run output.

schema_version: 1

entries:
  - id: reporting.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/reporting/.codex-plugin/plugin.json
    destination: plugins/reporting/.codex-plugin/plugin.json

  - id: reporting.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/reporting/skills
    destination: plugins/reporting/skills
    recursive: true

  - id: reporting.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/reporting/skills
    destination: skills/reporting
    recursive: true

  - id: meta.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/meta/.codex-plugin/plugin.json
    destination: plugins/meta/.codex-plugin/plugin.json

  - id: meta.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/meta/skills
    destination: plugins/meta/skills
    recursive: true

  - id: meta.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/meta/skills
    destination: skills/meta
    recursive: true

  - id: media.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/media/.codex-plugin/plugin.json
    destination: plugins/media/.codex-plugin/plugin.json

  - id: media.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/media/skills
    destination: plugins/media/skills
    recursive: true

  - id: media.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/media/skills
    destination: skills/media
    recursive: true

  - id: browser.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/browser/.codex-plugin/plugin.json
    destination: plugins/browser/.codex-plugin/plugin.json

  - id: browser.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/browser/skills
    destination: plugins/browser/skills
    recursive: true

  - id: browser.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/browser/skills
    destination: skills/browser
    recursive: true

  - id: conversation.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/conversation/.codex-plugin/plugin.json
    destination: plugins/conversation/.codex-plugin/plugin.json

  - id: conversation.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/conversation/skills
    destination: plugins/conversation/skills
    recursive: true

  - id: conversation.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/conversation/skills
    destination: skills/conversation
    recursive: true

  - id: evidence.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/evidence/.codex-plugin/plugin.json
    destination: plugins/evidence/.codex-plugin/plugin.json

  - id: evidence.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/evidence/skills
    destination: plugins/evidence/skills
    recursive: true

  - id: evidence.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/evidence/skills
    destination: skills/evidence
    recursive: true

  - id: pr.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/pr/.codex-plugin/plugin.json
    destination: plugins/pr/.codex-plugin/plugin.json

  - id: pr.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/pr/skills
    destination: plugins/pr/skills
    recursive: true

  - id: pr.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/pr/skills
    destination: skills/pr
    recursive: true

  - id: dispatch.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/codex/plugins/dispatch/.codex-plugin/plugin.json
    destination: plugins/dispatch/.codex-plugin/plugin.json

  - id: dispatch.skills-tree
    kind: symlinked-file
    source: build/codex/plugins/dispatch/skills
    destination: plugins/dispatch/skills
    recursive: true

  - id: dispatch.codex-skills-root
    kind: symlinked-file
    source: build/codex/plugins/dispatch/skills
    destination: skills/dispatch
    recursive: true

  - id: hooks.shared-scripts
    kind: symlinked-file
    source: core/hooks/shared
    destination: hooks

  - id: hooks.codex-config
    kind: managed-block
    destination: config.toml
    surface: hooks
    comment_style: hash
    body_template: |-
      [[hooks.PreToolUse]]
      matcher = "Bash"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/block-direct-git-commit.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block direct git commit"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/semantic-commit-body-gate.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Require semantic-commit body"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/block-direct-python.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block bare Python in managed repos"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/block-direct-pr-create.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block direct PR/MR creation"

      [[hooks.PreToolUse]]
      matcher = "Write|Edit|NotebookEdit|apply_patch"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/block-project-memory-write.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Protect project memory writes"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/mcp-secret-scan.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Scan .mcp.json for secrets"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/portable-paths-scan.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Scan docs for local paths"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/agent-scope-lock-guard.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Validate active scope lock"

      [[hooks.UserPromptSubmit]]
      matcher = ""

      [[hooks.UserPromptSubmit.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex AGENT_RUNTIME_DOCS_HOME=\"$HOME/.config/agent-kit\" \"$CODEX_HOME/hooks/user-prompt-agent-docs.sh\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind agent-docs preflight"

      [[hooks.UserPromptSubmit.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/skill-usage-reminder.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind skill-usage recording"

      [[hooks.SessionStart]]
      matcher = "startup|resume|clear"

      [[hooks.SessionStart.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex AGENT_RUNTIME_DOCS_HOME=\"$HOME/.config/agent-kit\" \"$CODEX_HOME/hooks/session-start-healthcheck.sh\""
      timeout = 20
      statusMessage = "agent-runtime-kit: Check baseline health"

      [[hooks.Stop]]
      matcher = ""

      [[hooks.Stop.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/stop-pre-pr-reminder.sh\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind PR readiness"

      [[hooks.Stop.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"$CODEX_HOME/hooks/agent-scope-lock-guard.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Report scope lock violations"
