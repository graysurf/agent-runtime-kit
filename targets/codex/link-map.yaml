  - id: hooks.codex-config
    kind: managed-block
    destination: config.toml
    surface: hooks
    comment_style: hash
    body_template: |-
      # Codex hook block body for `targets/codex/link-map.yaml`.
      [[hooks.PreToolUse]]
      matcher = "Bash"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/block-direct-git-commit.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block direct git commit"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/block-direct-git-worktree.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block direct git worktree"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/semantic-commit-body-gate.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Require semantic-commit body"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/block-direct-python.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block bare Python in managed repos"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/block-direct-pr-create.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Block direct PR/MR creation"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/forge-label-reminder.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind forge-cli label selection"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/finish-line-record.py\""
      timeout = 20
      statusMessage = "agent-runtime-kit: Record agent-docs validation runs"

      [[hooks.PreToolUse]]
      matcher = "Write|Edit|NotebookEdit|apply_patch"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/block-project-memory-write.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Protect project memory writes"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/mcp-secret-scan.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Scan .mcp.json for secrets"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/portable-paths-scan.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Scan docs for local paths"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/agent-scope-lock-guard.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Validate active scope lock"

      [[hooks.PreToolUse.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/finish-line-record.py\""
      timeout = 20
      statusMessage = "agent-runtime-kit: Record agent-docs code edits"

      [[hooks.UserPromptSubmit]]
      matcher = ""

      [[hooks.UserPromptSubmit.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/user-prompt-agent-docs.sh\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind agent-docs preflight"

      [[hooks.UserPromptSubmit.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/skill-usage-reminder.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind skill-usage recording"

      [[hooks.SessionStart]]
      matcher = "startup|resume|clear"

      [[hooks.SessionStart.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/session-start-healthcheck.sh\""
      timeout = 20
      statusMessage = "agent-runtime-kit: Check baseline health"

      [[hooks.Stop]]
      matcher = ""

      [[hooks.Stop.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/stop-pre-pr-reminder.sh\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Remind PR readiness"

      [[hooks.Stop.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/agent-scope-lock-guard.py\""
      timeout = 10
      statusMessage = "agent-runtime-kit: Report scope lock violations"

      [[hooks.Stop.hooks]]
      type = "command"
      command = "AGENT_RUNTIME_PRODUCT=codex \"${CODEX_HOME:-$HOME/.codex}/hooks/stop-finish-line-gate.py\""
      timeout = 20
      statusMessage = "agent-runtime-kit: Enforce agent-docs validation gate"
