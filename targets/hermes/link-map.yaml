# Hermes install link map.
#
# Schema: ../../core/docs/schemas/link-map.schema.json
#
# Hermes discovers skills from ~/.hermes/skills/<domain>/<skill>/SKILL.md.
# The rendered build output under build/hermes/ is copied to that tree.
# There is no Hermes plugin marketplace — skills are standalone SKILL.md files.

schema_version: 1

entries:
  - id: reporting.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/hermes/plugins/reporting/.hermes-plugin/plugin.json
    destination: .hermes/plugins/reporting/.hermes-plugin/plugin.json

  - id: reporting.skills-tree
    kind: symlinked-file
    source: build/hermes/plugins/reporting/skills
    destination: .hermes/skills/reporting
    recursive: true

  - id: meta.plugin-manifest
    kind: plugin-manifest-copy
    source: targets/hermes/plugins/meta/.hermes-plugin/plugin.json
    destination: .hermes/plugins/meta/.hermes-plugin/plugin.json

