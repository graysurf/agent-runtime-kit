# Drift audit allowlist seed.
#
# Each `unsafe_allow` entry demotes a matching drift-audit finding by ONE
# tier (block -> warn, warn -> suppressed), never beyond. The composite-scoring rules
# live in docs/source/inventory-target-architecture.md `## Drift Detection`
# and the `unsafe` classification semantics live in the same doc under
# `### Drift Audit Unsafe Class`.
#
# Entries must document why a matched public identifier is safe to demote.
schema_version: 1
unsafe_allow:
  - path: "core/docs/schemas/*.schema.json"
    reason: "Schema files contain public JSON Schema and local schema identifier URIs, not host secrets."
  - path: "core/hooks/shared/*"
    reason: "Hook guardrail source intentionally contains blocked command patterns, token regexes, and env var examples for detection; these are not credentials."
  - path: "core/hooks/shared/block-direct-python.py"
    reason: "Second demotion for the shared Python hook because the audit combines command-token punctuation and a documented bypass env example."
  - path: "targets/*/hooks/*"
    reason: "Product hook activation fragments intentionally contain command strings and hook matcher patterns, not secrets."
  - path: "core/hooks/claude/*"
    reason: "Claude hook activation fragments intentionally contain command strings and hook matcher patterns, not secrets."
  - path: "targets/*/link-map.yaml"
    reason: "Link maps intentionally embed hook command strings used by managed runtime config blocks."
  - path: "core/skills/conversation/*/SKILL.md.tera"
    reason: "Conversation workflow skills contain public safety instructions about omitting sensitive values; they do not contain credentials."
  - path: "build/*/plugins/conversation/skills/*/SKILL.md"
    reason: "Rendered conversation workflow skills mirror the public source safety instructions and do not contain credentials."
  - path: "targets/claude/scripts/memory-snapshot.sh"
    reason: "Help text contains an example output filename with an embedded date; the high-entropy match is the date string, not a credential."
  - path: "core/policies/heuristic-system/error-inbox/*/ENTRY.md"
    reason: "Inbox case entries cite forge-cli flag names, dry-run backend plans, and CLI command excerpts as evidence; the high-entropy matches are documented CLI surfaces and dated snapshot paths, not credentials. Archived peers in core/policies/heuristic-system/error-inbox/archive/ already pass without demotion."
  - path: "core/policies/heuristic-system/error-inbox/*/evidence/*"
    reason: "Ingested specialist-review findings.jsonl and skill-usage record excerpts contain command transcripts, finding fingerprints, and SKILL.md.tera paths with timestamps; the high-entropy matches are review evidence text, not credentials."
  - path: "core/policies/heuristic-system/error-inbox/archive/*/*/ENTRY.md"
    reason: "Archived inbox case entries preserve the same CLI-surface evidence as their active form; new archives that retain bullet lists of upstream PRs, release tags, and command excerpts can still score at the threshold and need the same demotion the active path receives."
  - path: "core/policies/heuristic-system/error-inbox/archive/*/*/evidence/*"
    reason: "Archived evidence files preserve the same ingested findings.jsonl and command transcripts as the active path's evidence; same rationale applies."
