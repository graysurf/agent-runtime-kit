# This checkout can act as the home docs catalog when AGENT_DOCS_HOME points
# here. Keep repo-only requirements at `scope = "project"`; they apply to this
# repository and linked worktrees, but are skipped for unrelated projects.
#
# Use `scope = "home"` for docs that should be inherited by unrelated project
# repositories when this checkout is the docs home. Home entries are resolved
# from this checkout, so `path` must point at a tracked file here.
#
# Home-scope example:
#
# [[document]]
# context = "startup"
# scope = "home"
# path = "docs/source/<shared-home-scope-doc>.md"
# required = true
# when = "always"
# notes = "Cross-repo guidance inherited from AGENT_DOCS_HOME for any project"

[[document]]
context = "project-dev"
scope = "project"
path = "DEVELOPMENT.md"
required = true
when = "path-exists:Cargo.toml || path-exists:package.json || path-exists:src/** || path-exists:scripts/ci/all.sh"
notes = "Local validation and CI gate procedure; required only for code repos (auto-skipped in a docs-only checkout)"

[[document]]
context = "project-dev"
scope = "home"
path = "core/policies/work-tier-levels.md"
required = true
when = "always"
notes = "Work-tier levels (L0-L3) and proactive triage: classify each work request into the lowest applicable tier, recommend the next step, and surface a decision at the L1+ escalation boundary. Home-scoped so any project-dev work inherits it when this checkout is the docs home."

[[document]]
context = "project-dev"
scope = "home"
path = "core/policies/git-delivery.md"
required = true
when = "always"
notes = "Detailed Git/commit/delivery mechanics behind the AGENT_HOME.md hard gates: semantic-commit body gate, managed worktree paths, branch naming, label selection, and PR/MR body format. Home-scoped so any project-dev work inherits it when this checkout is the docs home."

[[document]]
context = "project-dev"
scope = "home"
path = "core/policies/files-hooks-validation.md"
required = true
when = "always"
notes = "Detailed output-artifact, hook source/sync, and validation-command mechanics behind the AGENT_HOME.md directives: agent-out run dirs, the runtime-kit state out tree, hook config location and sync, and agent-run exec. Home-scoped so any project-dev work inherits it when this checkout is the docs home."

[[document]]
context = "project-dev"
scope = "project"
path = "docs/source/docs-placement-retention-policy-v1.md"
required = true
when = "always"
notes = "Docs placement and retention policy for docs/** and repository-root Markdown changes"

# Optional (required = false): available and auditable, but not force-injected
# into every project-dev preflight. Relevant only when doing coupled nils-cli
# work; DEVELOPMENT.md (always injected for this code repo) links to it.
[[document]]
context = "project-dev"
scope = "project"
path = "docs/source/nils-cli-version-workflows.md"
required = false
when = "always"
notes = "Downgrade / coupled-dev / pin-bump workflows for running a non-pinned nils-cli surface (scripts/dev/with-nils-version.sh) without relaxing the version-alignment gate."

[[document]]
context = "project-dev"
scope = "home"
path = "core/policies/review-thread-convergence.md"
required = false
when = "always"
notes = "Provider-agnostic discipline for dispositioning provider review threads and converging post-merge bot-review fix loops: per-finding triage, the convergence/stopping rule, and concentrate-vs-converge. Home-scoped and optional — referenced by review-cleanup-type skills (deliver-pr, code-review-follow-up, project-local review-cleanup) when a thread sweep is active, not force-injected for every project-dev task."

# task-tools intent: external-fact awareness plus optional CLI-tooling catalog.
# Docs-only (no [[validation]] contract); the UserPromptSubmit cue surfaces
# required docs alongside project-dev because the hook enumerates every declared
# intent. Optional docs remain auditable and available through agent-docs.
[[document]]
context = "task-tools"
scope = "home"
path = "core/policies/external-facts.md"
required = true
when = "always"
notes = "External, unstable, or time-sensitive claims: when to run the task-tools preflight, source tags, authoritative sourcing, and which evidence/reporting skills to prefer. Home-scoped so any task-tools work inherits it when this checkout is the docs home."

[[document]]
context = "task-tools"
scope = "home"
path = "core/policies/cli-tools.md"
required = false
when = "always"
notes = "Optional cross-project CLI tool catalog and recommended defaults (search, files, API exploration, structured data, etc.). Auditable through task-tools but not force-injected for every external-fact task."

# Per-intent validation contract: what must run before declaring a project-dev
# task done. Consumed by the finish-line gate via `preflight --intent
# project-dev --format json`; the gate blocks a stop when code was edited but
# `marker` is missing/stale, and a waiver releases it.
[[validation]]
context = "project-dev"
commands = ["bash scripts/ci/all.sh", "bash tests/hooks/run.sh"]
marker = ".cache/agent-validation/project-dev.ok"
description = "Run the kit CI gate stack and hook tests before declaring a project-dev task done."
