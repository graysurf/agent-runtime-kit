# This checkout can act as the home docs catalog when AGENT_DOCS_HOME points
# here. Keep repo-only requirements at `scope = "project"`; they apply to this
# repository and linked worktrees, but are skipped for unrelated projects.
#
# Use `scope = "global"` only for docs that should be inherited by unrelated
# project repositories when this checkout is the docs home. Global entries are
# still resolved from this checkout, so `path` must point at a tracked file here.
#
# Global-scope example:
#
# [[document]]
# context = "startup"
# scope = "global"
# path = "docs/source/<shared-home-scope-doc>.md"
# required = true
# when = "always"
# notes = "Cross-repo guidance inherited from AGENT_DOCS_HOME for any project"

[[document]]
context = "project-dev"
scope = "project"
path = "docs/source/docs-placement-retention-policy-v1.md"
required = true
when = "always"
notes = "Docs placement and retention policy for docs/** and repository-root Markdown changes"

[[document]]
context = "project-dev"
scope = "project"
path = "DEVELOPMENT.md"
required = true
when = "path-exists:Cargo.toml || path-exists:package.json || path-exists:src/** || path-exists:scripts/ci/all.sh"
notes = "Local validation and CI gate procedure; required only for code repos (auto-skipped in a docs-only checkout)"

[[document]]
context = "project-dev"
scope = "global"
path = "core/policies/work-tier-levels.md"
required = true
when = "always"
notes = "Work-tier levels (L0-L3) and proactive triage: classify each work request into the lowest applicable tier, recommend the next step, and surface a decision at the L1+ escalation boundary. Global so any project-dev work inherits it when this checkout is the docs home."

# Optional (required = false): available and auditable, but not force-injected
# into every project-dev preflight. Relevant only when doing coupled nils-cli
# work; DEVELOPMENT.md (always injected for this code repo) links to it.
[[document]]
context = "project-dev"
scope = "project"
path = "docs/source/nils-cli-version-workflows.md"
required = false
when = "always"
notes = "Downgrade / coupled-dev / pin-bump workflows for running a non-pinned nils-cli surface (scripts/dev/with-nils-version.sh) without relaxing the version-alignment gate."

# Per-intent validation contract: what must run before declaring a project-dev
# task done. Consumed by the finish-line gate via `preflight --intent
# project-dev --format json`; the gate blocks a stop when code was edited but
# `marker` is missing/stale, and a waiver releases it.
[[validation]]
context = "project-dev"
commands = ["bash scripts/ci/all.sh", "bash tests/hooks/run.sh"]
marker = ".cache/agent-validation/project-dev.ok"
description = "Run the kit CI gate stack and hook tests before declaring a project-dev task done."
